<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="日本語 Study">
<title>日本語 Study</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#000;--bg2:#0d0d0d;--bg3:#1a1a1a;
  --border:#222;--border2:#333;--border3:#444;
  --text:#fff;--text2:#999;--text3:#555;
  --accent:#e8c84a;
  --red:#e85454;--green:#4ac87a;
  --radius:12px;--radius-sm:8px;
}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;overflow-x:hidden;font-size:15px;}
.jp{font-family:'Noto Sans JP',sans-serif;}
button{cursor:pointer;border:none;background:none;color:inherit;font-family:inherit;font-size:inherit;}
input{font-family:inherit;font-size:inherit;}
.nav{display:flex;align-items:center;justify-content:space-between;padding:14px 20px;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--bg);z-index:100;}
.nav-title{font-size:17px;font-weight:600;}
.nav-title span{color:var(--accent);}
.nav-tabs{display:flex;gap:2px;}
.nav-tab{padding:7px 14px;border-radius:var(--radius-sm);font-size:13px;font-weight:500;color:var(--text2);transition:all 0.15s;}
.nav-tab.active{background:var(--bg3);color:var(--text);}
.nav-tab:hover:not(.active){color:var(--text);}
.section{padding:20px;}
.section-title{font-size:11px;font-weight:600;color:var(--text3);letter-spacing:0.1em;text-transform:uppercase;margin-bottom:14px;}
.page-title{font-size:20px;font-weight:600;margin-bottom:4px;}
.page-sub{font-size:13px;color:var(--text2);margin-bottom:20px;}
.select-group{margin-bottom:18px;}
.select-label{font-size:12px;color:var(--text2);margin-bottom:8px;display:block;font-weight:500;}
.select-pills{display:flex;flex-wrap:wrap;gap:6px;}
.pill{padding:7px 14px;border-radius:20px;border:1px solid var(--border2);font-size:13px;color:var(--text2);cursor:pointer;transition:all 0.15s;background:none;}
.pill.active{background:var(--accent);border-color:var(--accent);color:#000;font-weight:600;}
.pill:hover:not(.active){border-color:var(--border3);color:var(--text);}
.pill-sm{padding:5px 10px;font-size:12px;}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:16px;}
.card-sm{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:12px;}
.btn{padding:11px 22px;border-radius:var(--radius-sm);font-size:14px;font-weight:600;cursor:pointer;transition:all 0.15s;display:inline-block;}
.btn-primary{background:var(--accent);color:#000;border:none;}
.btn-primary:hover{background:#f0d060;}
.btn-primary:disabled{background:var(--bg3);color:var(--text3);cursor:default;}
.btn-secondary{background:var(--bg3);border:1px solid var(--border2);color:var(--text);}
.btn-secondary:hover{border-color:var(--border3);}
.btn-row{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-top:12px;}
.btn-full{width:100%;text-align:center;}
.back-btn{display:flex;align-items:center;gap:6px;color:var(--text2);font-size:13px;margin-bottom:18px;padding:0;background:none;border:none;}
.back-btn:hover{color:var(--text);}
.search-input{width:100%;background:var(--bg2);border:1px solid var(--border2);border-radius:var(--radius-sm);padding:11px 14px;font-size:15px;color:var(--text);outline:none;margin-bottom:10px;}
.search-input:focus{border-color:var(--accent);}
.text-input{width:100%;background:var(--bg3);border:1px solid var(--border2);border-radius:var(--radius-sm);padding:10px 14px;font-size:14px;color:var(--text);outline:none;}
.text-input:focus{border-color:var(--accent);}
.search-results{display:flex;flex-direction:column;gap:6px;max-height:280px;overflow-y:auto;}
.search-result{background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius-sm);padding:11px 14px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;transition:all 0.15s;}
.search-result:hover{border-color:var(--border3);}
.search-result-main{font-size:16px;font-weight:600;}
.search-result-kana{font-size:12px;color:var(--text3);margin-left:6px;}
.search-result-en{font-size:12px;color:var(--text2);margin-top:2px;}
.score-bar{background:var(--bg3);border-radius:2px;height:3px;margin-bottom:14px;}
.score-fill{height:100%;background:var(--accent);border-radius:2px;transition:width 0.3s;}
.flashcard-scene{width:100%;perspective:1000px;cursor:pointer;margin:16px 0;}
.flashcard-inner{width:100%;position:relative;transform-style:preserve-3d;transition:transform 0.45s;}
.flashcard-inner.flipped{transform:rotateY(180deg);}
.flashcard-face{position:absolute;top:0;left:0;width:100%;backface-visibility:hidden;background:var(--bg2);border:1px solid var(--border2);border-radius:var(--radius);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;text-align:center;}
.flashcard-back{transform:rotateY(180deg);}
.flashcard-tap-hint{font-size:11px;color:var(--text3);margin-top:14px;letter-spacing:0.05em;}
.flashcard-nav{display:flex;align-items:center;justify-content:center;gap:20px;}
.fc-btn{width:44px;height:44px;border-radius:50%;border:1px solid var(--border2);display:flex;align-items:center;justify-content:center;font-size:18px;transition:all 0.15s;color:var(--text2);}
.fc-btn:hover{border-color:var(--accent);color:var(--accent);}
.fc-count{font-size:13px;color:var(--text2);min-width:60px;text-align:center;}
.quiz-q{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:18px;margin-bottom:14px;text-align:center;}
.quiz-q-label{font-size:12px;color:var(--text3);margin-bottom:8px;letter-spacing:0.03em;}
.quiz-q-main{font-size:22px;font-weight:600;}
.quiz-q-sub{font-size:14px;color:var(--text2);margin-top:6px;}
.mc-options{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px;}
.mc-option{background:var(--bg2);border:1px solid var(--border2);border-radius:var(--radius-sm);padding:13px;font-size:16px;text-align:center;transition:all 0.15s;font-family:'Noto Sans JP',sans-serif;}
.mc-option:hover:not(:disabled){border-color:var(--border3);}
.mc-option.correct{background:#0d2b18;border-color:var(--green);color:var(--green);}
.mc-option.wrong{background:#2b0d0d;border-color:var(--red);color:var(--red);}
.mc-option:disabled{cursor:default;}
.match-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px;}
.match-col{display:flex;flex-direction:column;gap:6px;}
.match-item{background:var(--bg2);border:1px solid var(--border2);border-radius:var(--radius-sm);padding:11px;font-size:13px;text-align:center;cursor:pointer;transition:all 0.15s;min-height:48px;display:flex;align-items:center;justify-content:center;font-family:'Noto Sans JP',sans-serif;}
.match-item:hover:not(.matched):not(.selected){border-color:var(--border3);}
.match-item.selected{border-color:var(--accent);background:rgba(232,200,74,0.06);}
.match-item.matched{border-color:var(--green);background:rgba(74,200,122,0.06);color:var(--green);cursor:default;}
.match-item.wrong-flash{border-color:var(--red);background:rgba(232,84,84,0.06);}
.result-screen{text-align:center;padding:48px 20px;}
.result-score{font-size:64px;font-weight:700;color:var(--accent);margin-bottom:6px;line-height:1;}
.result-label{font-size:15px;color:var(--text2);margin-bottom:28px;}
.badge{display:inline-block;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:600;}
.badge-n5{background:#0d1f3a;color:#4a90e8;}
.badge-n4{background:#1f0d3a;color:#904ae8;}
.badge-custom{background:#2a2a0d;color:#e8c84a;}
.list-item{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:11px 14px;display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;}
.delete-btn{color:var(--text3);font-size:16px;padding:4px 8px;line-height:1;}
.delete-btn:hover{color:var(--red);}
.divider{border:none;border-top:1px solid var(--border);margin:20px 0;}
.loading{display:flex;align-items:center;justify-content:center;padding:32px;color:var(--text3);font-size:13px;}
.mb-16{margin-bottom:16px;}
.conj-section{margin-bottom:20px;}
.conj-section-title{font-size:11px;font-weight:600;color:var(--text3);letter-spacing:0.08em;text-transform:uppercase;margin-bottom:8px;padding-bottom:6px;border-bottom:1px solid var(--border);}
.conj-table{width:100%;border-collapse:collapse;font-size:12px;}
.conj-table th{text-align:left;padding:7px 8px;color:var(--text3);font-weight:500;border-bottom:1px solid var(--border);white-space:nowrap;}
.conj-table td{padding:7px 8px;border-bottom:1px solid var(--border);}
.conj-table td.row-label{color:var(--text2);font-size:11px;white-space:nowrap;}
.sel-btn{padding:3px 8px;border-radius:12px;border:1px solid var(--border2);font-size:11px;color:var(--text3);cursor:pointer;transition:all 0.15s;white-space:nowrap;background:none;}
.sel-btn.active{background:var(--accent);border-color:var(--accent);color:#000;font-weight:600;}
.sel-btn:hover:not(.active){border-color:var(--border3);}
.verb-display{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:14px;margin-bottom:16px;}
</style>
</head>

function getVerbType(dict,kana){
  const w=dict,b=kana||dict;
  if(w==="する"||w==="来る"||w==="くる") return "irregular";
  if(w.endsWith("する")) return "suru";
  if(w.endsWith("くる")||w.endsWith("来る")) return "kuru";
  if(b.endsWith("る")){if("いきしちにひみりえけせてねへめれぎじびぴでげぜべぺ".includes(b.slice(-2,-1))) return "ichidan";}
  return "godan";
}

function conjugate(word,reading){
  const type=getVerbType(word,reading),base=reading||word,R={};
  function set(g,row,col,k,r){R[`${g}|${row}|${col}`]={k,r};}
  function setNA(g,row,col){R[`${g}|${row}|${col}`]=null;}
  if(type==="ichidan"){
    const stem=base.slice(0,-1),ks=word.endsWith("る")?word.slice(0,-1):stem;
    set("plain","present","pos",ks+"る",stem+"る");set("plain","present","neg",ks+"ない",stem+"ない");
    set("plain","past","pos",ks+"た",stem+"た");set("plain","past","neg",ks+"なかった",stem+"なかった");
    set("plain","te","pos",ks+"て",stem+"て");setNA("plain","te","neg");

function shuffle(a){return[...a].sort(()=>Math.random()-0.5);}
function rand(a){return a[Math.floor(Math.random()*a.length)];}

function makeNearMisses(correct,verb){
  const conjs=conjugate(verb.k,verb.r);
  const pool=Object.values(conjs).filter(v=>v&&v.r!==correct).map(v=>v.r);
  const opts=[correct,...shuffle(pool).slice(0,3)];
  while(opts.length<4){const t=correct.slice(0,-1)+rand(["た","て","ない","ます","った","って","なかった"]);if(!opts.includes(t))opts.push(t);}
  return shuffle(opts.slice(0,4));
}
function makeVocabDistractors(correct,pool,field){
  return shuffle([correct,...shuffle(pool.map(w=>w[field]).filter(v=>v&&v!==correct)).slice(0,3)]).slice(0,4);
}

async function searchJisho(q){
  setState({search_loading:true,search_results:[]});
  try{
    const res=await fetch(`https://jisho.org/api/v1/search/words?keyword=${encodeURIComponent(q)}`);
    const data=await res.json();
    const results=(data.data||[]).slice(0,8).map(e=>{
      const jp=e.japanese&&e.japanese[0]||{},s=e.senses&&e.senses[0]||{};
      return{k:jp.word||jp.reading||"",r:jp.reading||jp.word||"",e:(s.english_definitions||[]).slice(0,2).join("; ")};
    }).filter(w=>w.k||w.r);
    setState({search_loading:false,search_results:results});
  }catch(e){setState({search_loading:false,search_results:[{k:"エラー",r:"えらー",e:"Search failed"}]});}
}

function buildMCQuiz(){
  const q=state.qz_questions[state.qz_idx];if(!q)return'';
  const total=state.qz_questions.length;
  return`<div class="section">
    <div style="display:flex;justify-content:space-between;margin-bottom:6px;">
      <span style="font-size:12px;color:var(--text2);">Question ${state.qz_idx+1} of ${total}</span>
      <span style="font-size:12px;color:var(--accent);">Score: ${state.qz_score}</span>
    </div>
    <div class="score-bar"><div class="score-fill" style="width:${Math.round(state.qz_idx/total*100)}%"></div></div>
    <div class="quiz-q">
      <div class="quiz-q-label">${q.hint||'Choose the correct answer'}</div>
      <div class="quiz-q-main jp">${q.q}</div>
      ${q.q_sub?`<div class="quiz-q-sub">${q.q_sub}</div>`:''}
    </div>
    <div class="mc-options">
      ${q.options.map(opt=>{
        let cls='mc-option';
        if(state.qz_answered){if(opt===q.ans)cls+=' correct';else if(opt===state.qz_selected)cls+=' wrong';}
        return`<button class="${cls}" ${state.qz_answered?'disabled':''} onclick="answerMC('${opt.replace(/'/g,"\\'")}','${q.ans.replace(/'/g,"\\'")}')">${opt}</button>`;
      }).join("")}
    </div>
    ${state.qz_answered?`<div class="btn-row"><button class="btn btn-primary" onclick="nextQ()">Next</button></div>`:''}
  </div>`;}

function buildMatchQuiz(){
  const left=state.qz_match_left,right=state.qz_match_right,matched=state.qz_match_matched;
  return`<div class="section">
    <div style="display:flex;justify-content:space-between;margin-bottom:10px;">
      <span style="font-size:12px;color:var(--text2);">Matching pairs</span>
      <span style="font-size:12px;color:var(--accent);">Score: ${state.qz_score}</span>
    </div>
    <div class="quiz-q" style="margin-bottom:12px;"><div class="quiz-q-label">Match each item with its correct pair</div></div>
    <div class="match-grid">
      <div class="match-col">${left.map((p,i)=>{const isM=matched.includes(i),isS=state.qz_match_sel_left===i;
        return`<button class="match-item ${isM?'matched':''} ${isS?'selected':''}" id="ml-${i}" ${isM?'disabled':''} onclick="selMatchL(${i})">${p.q}</button>`;}).join("")}</div>
      <div class="match-col">${right.map((r,i)=>{const isM=matched.includes(r.origIdx),isS=state.qz_match_sel_right===i;
        return`<button class="match-item ${isM?'matched':''} ${isS?'selected':''}" id="mr-${i}" ${isM?'disabled':''} onclick="selMatchR(${i})">${r.ans}</button>`;}).join("")}</div>
    </div>
    ${matched.length===left.length?`<div class="btn-row">
      <button class="btn btn-primary" onclick="nextMatchRound()">Next round</button>

function buildQZResult(){

window.goTo=(s)=>setState({screen:s,search_results:[],search_query:'',qz_started:false});
let _st;
window.handleSearch=(v)=>{setState({search_query:v});clearTimeout(_st);if(v.length<1)return setState({search_results:[]});_st=setTimeout(()=>searchJisho(v),600);};
window.startVocabFC=()=>{
  let words;
  if(state.fc_cat&&state.fc_cat.startsWith('custom_')){const gi=parseInt(state.fc_cat.replace('custom_',''));words=state.custom_groups[gi]?state.custom_groups[gi].words:[];}
  else{words=state.fc_cat==="All"?getAllWordsForLevel(state.fc_level):getAllWords(state.fc_level,state.fc_cat);}
  setState({fc_cards:shuffle(words),fc_idx:0,fc_flipped:false});
};
window.fcNext=()=>{const cards=state.fc_mode==='conj'?state.fc_conj_cards:state.fc_cards;setState({fc_idx:Math.min(state.fc_idx+1,cards.length-1),fc_flipped:false});};
window.fcPrev=()=>setState({fc_idx:Math.max(state.fc_idx-1,0),fc_flipped:false});
window.selectFCVerb=(i)=>setState({fc_verb:state.search_results[i],search_results:[],search_query:'',fc_selected_conjs:[]});
window.toggleFCConj=(g,row,col)=>{const key=`${g}|${row}|${col}`;const sel=state.fc_selected_conjs;setState({fc_selected_conjs:sel.includes(key)?sel.filter(k=>k!==key):[...sel,key]});};
window.selectAllFCConjs=()=>{const conjs=conjugate(state.fc_verb.k,state.fc_verb.r);setState({fc_selected_conjs:Object.entries(conjs).filter(([,v])=>v!==null).map(([k])=>k)});};
window.startConjFC=()=>{
  const conjs=conjugate(state.fc_verb.k,state.fc_verb.r);
  const cards=shuffle(state.fc_selected_conjs.map(key=>{const[g,row,col]=key.split('|');return{verb:state.fc_verb,group:g,row,col,val:conjs[key],label:getConjLabel(g,row,col)};}).filter(c=>c.val));
  setState({fc_conj_cards:cards,fc_idx:0,fc_flipped:false});
};
window.selectQZVerb=(i)=>setState({qz_verb:state.search_results[i],search_results:[],search_query:'',qz_selected_conjs:[]});
window.toggleQZConj=(g,row,col)=>{const key=`${g}|${row}|${col}`;const sel=state.qz_selected_conjs;setState({qz_selected_conjs:sel.includes(key)?sel.filter(k=>k!==key):[...sel,key]});};
window.selectAllQZConjs=()=>{const conjs=conjugate(state.qz_verb.k,state.qz_verb.r);setState({qz_selected_conjs:Object.entries(conjs).filter(([,v])=>v!==null).map(([k])=>k)});};
window.startQuiz=()=>{
  if(state.qz_mode==='vocab'){
    const words=shuffle(state.qz_cat==="All"?getAllWordsForLevel(state.qz_level):getAllWords(state.qz_level,state.qz_cat));
    if(state.qz_type==='mc'){setState({qz_questions:words.slice(0,10).map(w=>buildMCVocabQ(w,words)),qz_idx:0,qz_score:0,qz_done:false,qz_answered:false,qz_selected:null,qz_started:true});}
    else{setupVocabMatchRound(words);}
  } else {
    const conjs=conjugate(state.qz_verb.k,state.qz_verb.r);
    const cards=shuffle(state.qz_selected_conjs.map(key=>{const[g,row,col]=key.split('|');return{verb:state.qz_verb,group:g,row,col,val:conjs[key],label:getConjLabel(g,row,col)};}).filter(c=>c.val));
    if(state.qz_type==='mc'){setState({qz_questions:cards.slice(0,10).map(c=>({q:c.verb.k,q_sub:c.label,ans:c.val.r,options:makeNearMisses(c.val.r,c.verb),hint:`What is the ${c.label} form?`})),qz_idx:0,qz_score:0,qz_done:false,qz_answered:false,qz_selected:null,qz_started:true});}
    else{setupConjMatchRound(cards);}
  }
};
function buildMCVocabQ(w,pool){
  if(state.qz_front==='kanji') return{q:w.k,ans:w.r,options:makeVocabDistractors(w.r,pool,'r'),hint:'What is the reading (kana) of this word?'};
  if(state.qz_front==='kana') return{q:w.r,ans:w.e,options:makeVocabDistractors(w.e,pool,'e'),hint:'What does this word mean?'};
  return{q:w.e,ans:w.k,options:makeVocabDistractors(w.k,pool,'k'),hint:'What is the kanji for this word?'};
}
function setupVocabMatchRound(words){
  const pairs=shuffle(words).slice(0,6).map(w=>{let q,ans;if(state.qz_front==='kanji'){q=w.k;ans=w.r;}else if(state.qz_front==='kana'){q=w.r;ans=w.e;}else{q=w.e;ans=w.k;}return{q,ans};});
  const right=shuffle(pairs.map((p,i)=>({ans:p.ans,origIdx:i})));
  setState({qz_match_left:pairs,qz_match_right:right,qz_match_matched:[],qz_match_sel_left:null,qz_match_sel_right:null,qz_score:0,qz_done:false,qz_questions:pairs,_match_words:words,_match_type:'vocab',qz_started:true});
}
function setupConjMatchRound(cards){
  const pairs=shuffle(cards).slice(0,6).map(c=>({q:c.label,ans:c.val.r}));
  const right=shuffle(pairs.map((p,i)=>({ans:p.ans,origIdx:i})));
  setState({qz_match_left:pairs,qz_match_right:right,qz_match_matched:[],qz_match_sel_left:null,qz_match_sel_right:null,qz_score:0,qz_done:false,qz_questions:pairs,_match_cards:cards,_match_type:'conj',qz_started:true});
}
window.selMatchL=(i)=>{setState({qz_match_sel_left:i});checkMatch();};
window.selMatchR=(i)=>{setState({qz_match_sel_right:i});checkMatch();};
function checkMatch(){
  const{qz_match_sel_left:l,qz_match_sel_right:r,qz_match_right:right,qz_match_matched:matched}=state;
  if(l===null||r===null) return;
  if(right[r].origIdx===l){const nm=[...matched,l];setState({qz_match_matched:nm,qz_match_sel_left:null,qz_match_sel_right:null,qz_score:state.qz_score+1});}
  else{
    const ml=document.getElementById('ml-'+l),mr=document.getElementById('mr-'+r);
    if(ml){ml.classList.add('wrong-flash');setTimeout(()=>ml&&ml.classList.remove('wrong-flash'),500);}
    if(mr){mr.classList.add('wrong-flash');setTimeout(()=>mr&&mr.classList.remove('wrong-flash'),500);}
    setState({qz_match_sel_left:null,qz_match_sel_right:null});
  }
}
window.nextMatchRound=()=>{if(state._match_type==='vocab')setupVocabMatchRound(state._match_words);else setupConjMatchRound(state._match_cards);};
window.answerMC=(opt,ans)=>setState({qz_answered:true,qz_selected:opt,qz_score:opt===ans?state.qz_score+1:state.qz_score});
window.nextQ=()=>{const next=state.qz_idx+1;if(next>=state.qz_questions.length)setState({qz_done:true,qz_answered:false});else setState({qz_idx:next,qz_answered:false,qz_selected:null});};
window.addWord=(i)=>{const w=state.search_results[i];if(!state.custom_words.find(x=>x.k===w.k&&x.r===w.r))setState({custom_words:[...state.custom_words,w],search_results:[],search_query:''});};
window.removeWord=(i)=>setState({custom_words:state.custom_words.filter((_,j)=>j!==i)});
window.createGroup=()=>{if(!state.new_group_name)return;setState({custom_groups:[...state.custom_groups,{name:state.new_group_name,words:[]}],new_group_name:''});};
window.removeGroup=(i)=>setState({custom_groups:state.custom_groups.filter((_,j)=>j!==i)});
window.addWordToGroup=(gi,wi)=>{const groups=[...state.custom_groups];const w=state.custom_words[wi];if(!groups[gi].words.find(x=>x.k===w.k)){groups[gi]={...groups[gi],words:[...groups[gi].words,w]};}setState({custom_groups:groups});};
window.removeWordFromGroup=(gi,wi)=>{const groups=[...state.custom_groups];groups[gi]={...groups[gi],words:groups[gi].words.filter((_,j)=>j!==wi)};setState({custom_groups:groups});};

render();
</script>
