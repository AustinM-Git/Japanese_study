<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="日本語 Study">
<title>日本語 Study</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{--bg:#000;--bg2:#0d0d0d;--bg3:#1a1a1a;--border:#222;--border2:#333;--border3:#444;--text:#fff;--text2:#999;--text3:#555;--accent:#e8c84a;--red:#e85454;--green:#4ac87a;--radius:12px;--radius-sm:8px;}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;overflow-x:hidden;font-size:15px;}
.jp{font-family:'Noto Sans JP',sans-serif;}
button{cursor:pointer;border:none;background:none;color:inherit;font-family:inherit;font-size:inherit;}
input{font-family:inherit;font-size:inherit;}
.nav{display:flex;align-items:center;justify-content:space-between;padding:14px 20px;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--bg);z-index:100;}
.nav-title{font-size:17px;font-weight:600;cursor:pointer;background:none;border:none;color:var(--text);padding:0;}
.nav-title span{color:var(--accent);}
.nav-tabs{display:flex;gap:2px;}
.nav-tab{padding:7px 14px;border-radius:var(--radius-sm);font-size:13px;font-weight:500;color:var(--text2);transition:all 0.15s;}
.nav-tab.active{background:var(--bg3);color:var(--text);}
.nav-tab:hover:not(.active){color:var(--text);}
.section{padding:20px;}
.section-title{font-size:11px;font-weight:600;color:var(--text3);letter-spacing:0.1em;text-transform:uppercase;margin-bottom:14px;}
.page-title{font-size:20px;font-weight:600;margin-bottom:4px;}
.page-sub{font-size:13px;color:var(--text2);margin-bottom:20px;}
.select-group{margin-bottom:18px;}
.select-label{font-size:12px;color:var(--text2);margin-bottom:8px;display:block;font-weight:500;}
.select-pills{display:flex;flex-wrap:wrap;gap:6px;}
.pill{padding:7px 14px;border-radius:20px;border:1px solid var(--border2);font-size:13px;color:var(--text2);cursor:pointer;transition:all 0.15s;background:none;}
.pill.active{background:var(--accent);border-color:var(--accent);color:#000;font-weight:600;}
.pill:hover:not(.active){border-color:var(--border3);color:var(--text);}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:16px;}
.btn{padding:11px 22px;border-radius:var(--radius-sm);font-size:14px;font-weight:600;cursor:pointer;transition:all 0.15s;display:inline-block;}
.btn-primary{background:var(--accent);color:#000;border:none;}
.btn-primary:hover{background:#f0d060;}
.btn-primary:disabled{background:var(--bg3);color:var(--text3);cursor:default;}
.btn-secondary{background:var(--bg3);border:1px solid var(--border2);color:var(--text);}
.btn-secondary:hover{border-color:var(--border3);}
.btn-row{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-top:12px;}
.btn-full{width:100%;text-align:center;}
.back-btn{display:flex;align-items:center;gap:6px;color:var(--text2);font-size:13px;margin-bottom:18px;padding:0;background:none;border:none;}
.back-btn:hover{color:var(--text);}
.score-bar{background:var(--bg3);border-radius:2px;height:3px;margin-bottom:14px;}
.score-fill{height:100%;background:var(--accent);border-radius:2px;transition:width 0.3s;}
.flashcard-scene{width:100%;perspective:1000px;cursor:pointer;margin:16px 0;}
.flashcard-inner{width:100%;position:relative;transform-style:preserve-3d;transition:transform 0.45s;}
.flashcard-inner.flipped{transform:rotateY(180deg);}
.flashcard-face{position:absolute;top:0;left:0;width:100%;backface-visibility:hidden;background:var(--bg2);border:1px solid var(--border2);border-radius:var(--radius);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;text-align:center;}
.flashcard-back{transform:rotateY(180deg);}
.flashcard-tap-hint{font-size:11px;color:var(--text3);margin-top:14px;letter-spacing:0.05em;}
.flashcard-nav{display:flex;align-items:center;justify-content:center;gap:20px;}
.fc-btn{width:44px;height:44px;border-radius:50%;border:1px solid var(--border2);display:flex;align-items:center;justify-content:center;font-size:18px;transition:all 0.15s;color:var(--text2);}
.fc-btn:hover{border-color:var(--accent);color:var(--accent);}
.fc-count{font-size:13px;color:var(--text2);min-width:60px;text-align:center;}
.quiz-q{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:18px;margin-bottom:14px;text-align:center;}
.quiz-q-label{font-size:12px;color:var(--text3);margin-bottom:8px;}
.quiz-q-main{font-size:22px;font-weight:600;}
.quiz-q-sub{font-size:14px;color:var(--text2);margin-top:6px;}
.mc-options{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px;}
.mc-option{background:var(--bg2);border:1px solid var(--border2);border-radius:var(--radius-sm);padding:13px;font-size:15px;text-align:center;transition:all 0.15s;font-family:'Noto Sans JP',sans-serif;}
.mc-option:hover:not(:disabled){border-color:var(--border3);}
.mc-option.correct{background:#0d2b18;border-color:var(--green);color:var(--green);}
.mc-option.wrong{background:#2b0d0d;border-color:var(--red);color:var(--red);}
.mc-option:disabled{cursor:default;}
.match-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px;}
.match-col{display:flex;flex-direction:column;gap:6px;}
.match-item{background:var(--bg2);border:1px solid var(--border2);border-radius:var(--radius-sm);padding:11px;font-size:17px;text-align:center;cursor:pointer;transition:all 0.15s;min-height:56px;display:flex;align-items:center;justify-content:center;font-family:'Noto Sans JP',sans-serif;}
.match-item:hover:not(.matched):not(.selected){border-color:var(--border3);}
.match-item.selected{border-color:var(--accent);background:rgba(232,200,74,0.06);}
.match-item.matched{border-color:var(--green);background:rgba(74,200,122,0.06);color:var(--green);cursor:default;}
.match-item.wrong-flash{border-color:var(--red);background:rgba(232,84,84,0.06);}
.result-screen{text-align:center;padding:48px 20px;}
.result-score{font-size:64px;font-weight:700;color:var(--accent);margin-bottom:6px;line-height:1;}
.result-label{font-size:15px;color:var(--text2);margin-bottom:28px;}
.badge{display:inline-block;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:600;}
.badge-n5{background:#0d1f3a;color:#4a90e8;}
.badge-n4{background:#1f0d3a;color:#904ae8;}
.divider{border:none;border-top:1px solid var(--border);margin:20px 0;}
.group-list{display:flex;flex-direction:column;gap:6px;margin-bottom:16px;}
.group-item{background:var(--bg2);border:1px solid var(--border2);border-radius:var(--radius-sm);padding:12px 14px;display:flex;justify-content:space-between;align-items:center;cursor:pointer;transition:all 0.15s;}
.group-item:hover{border-color:var(--border3);}
.group-item.selected{border-color:var(--accent);background:rgba(232,200,74,0.06);}
.group-item-name{font-size:14px;font-weight:500;}
.group-item-count{font-size:12px;color:var(--text3);}
.group-item-check{font-size:16px;color:var(--accent);}
.verb-display{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:14px;margin-bottom:16px;}
.conj-section{margin-bottom:20px;}
.conj-section-title{font-size:11px;font-weight:600;color:var(--text3);letter-spacing:0.08em;text-transform:uppercase;margin-bottom:8px;padding-bottom:6px;border-bottom:1px solid var(--border);}
.conj-table{width:100%;border-collapse:collapse;font-size:12px;}
.conj-table th{text-align:left;padding:7px 8px;color:var(--text3);font-weight:500;border-bottom:1px solid var(--border);white-space:nowrap;}
.conj-table td{padding:7px 8px;border-bottom:1px solid var(--border);}
.conj-table td.row-label{color:var(--text2);font-size:11px;white-space:nowrap;}
.sel-btn{padding:3px 8px;border-radius:12px;border:1px solid var(--border2);font-size:11px;color:var(--text3);cursor:pointer;transition:all 0.15s;white-space:nowrap;background:none;}
.sel-btn.active{background:var(--accent);border-color:var(--accent);color:#000;font-weight:600;}
.sel-btn:hover:not(.active){border-color:var(--border3);}
.search-input{width:100%;background:var(--bg2);border:1px solid var(--border2);border-radius:var(--radius-sm);padding:11px 14px;font-size:15px;color:var(--text);outline:none;margin-bottom:10px;}
.search-input:focus{border-color:var(--accent);}
.verb-result{background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius-sm);padding:11px 14px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;transition:all 0.15s;margin-bottom:6px;}
.verb-result:hover{border-color:var(--border3);}
</style>
</head>

// Build verb list from vocabulary
function buildVerbList() {
const verbs = [];
const seen = new Set();
for(const [pos,cats] of Object.entries(VOCAB_N5)) {
if(pos!==‘verbs’) continue;
for(const words of Object.values(cats)) {
for(const w of words) {
const key = w.k+’|’+w.r;
if(!seen.has(key)&&w.e.startsWith(‘to ‘)) { seen.add(key); verbs.push({…w,level:‘N5’}); }
}
}
}
for(const [pos,cats] of Object.entries(VOCAB_N4)) {
if(pos!==‘verbs’) continue;
for(const words of Object.values(cats)) {
for(const w of words) {
const key = w.k+’|’+w.r;
if(!seen.has(key)&&w.e.startsWith(’to ’)) { seen.add(key); verbs.push({…w,level:‘N4’}); }
}
}
}
return verbs.sort((a,b)=>a.r.localeCompare(b.r,‘ja’));
}

// Helpers
function shuffle(a){return[…a].sort(()=>Math.random()-0.5);}
function rand(a){return a[Math.floor(Math.random()*a.length)];}

function getVocabData(level) {
if(level===‘N5’) return VOCAB_N5;
if(level===‘N4’) return VOCAB_N4;
return null;
}

function getWordsForGroups(level, posKey, groupNames) {
const words = [];
const seen = new Set();
const levels = level===‘All’ ? [‘N5’,‘N4’] : [level];
for(const lv of levels) {
const data = getVocabData(lv);
if(!data||!data[posKey]) continue;
for(const gName of groupNames) {
const grp = data[posKey][gName];
if(!grp) continue;
for(const w of grp) {
const key = w.k+’|’+w.r;
if(!seen.has(key)) { seen.add(key); words.push({…w,level:lv}); }
}
}
}
return words;
}

function getGroupsForPOS(level, posKey) {
const result = [];
const levels = level===‘All’ ? [‘N5’,‘N4’] : [level];
for(const lv of levels) {
const data = getVocabData(lv);
if(!data||!data[posKey]) continue;
for(const [name,words] of Object.entries(data[posKey])) {
result.push({name, count:words.length, level:lv});
}
}
return result;
}

function makeDistractors(correct, pool, field) {
const others = shuffle(pool.map(w=>w[field]).filter(v=>v&&v!==correct));
return shuffle([correct,…others.slice(0,3)]).slice(0,4);
}

function makeConjDistractors(correct, verb) {
const conjs = conjugate(verb.k, verb.r);
const pool = Object.values(conjs).filter(v=>v&&v.r!==correct).map(v=>v.r);
const opts = [correct,…shuffle(pool).slice(0,3)];
const suffixes = [“た”,“て”,“ない”,“ます”,“った”,“って”,“なかった”,“れる”,“せる”,“たい”];
while(opts.length<4){
const t=correct.slice(0,-1)+rand(suffixes);
if(!opts.includes(t)) opts.push(t);
}
return shuffle(opts.slice(0,4));
}

}

function buildMatchQuiz(){
const left=state.qzMatchLeft, right=state.qzMatchRight, matched=state.qzMatchMatched;
return`<div class="section"> <div style="display:flex;justify-content:space-between;margin-bottom:10px;"> <span style="font-size:12px;color:var(--text2);">Matching pairs</span> <span style="font-size:12px;color:var(--accent);">Score: ${state.qzScore}</span> </div> <div class="quiz-q" style="margin-bottom:12px;"><div class="quiz-q-label">Match each item to its pair</div></div> <div class="match-grid"> <div class="match-col">${left.map((p,i)=>{const isM=matched.includes(i),isS=state.qzMatchSelL===i; return`<button class=“match-item ${isM?‘matched’:’’} ${isS?‘selected’:’’}” id=“ml-${i}” ${isM?‘disabled’:’’} onclick=“selMatchL(${i})”><span class="jp">${p.q}</span></button>`;}).join('')}</div> <div class="match-col">${right.map((r,i)=>{const isM=matched.includes(r.origIdx),isS=state.qzMatchSelR===i; return`<button class=“match-item ${isM?‘matched’:’’} ${isS?‘selected’:’’}” id=“mr-${i}” ${isM?‘disabled’:’’} onclick=“selMatchR(${i})”><span class="jp">${r.ans}</span></button>`;}).join('')}</div> </div> ${matched.length===left.length?`<div class="btn-row">
<button class="btn btn-primary" onclick="nextMatchRound()">Next round</button>
<button class="btn btn-secondary" onclick="setState({qzDone:true})">Finish</button>
</div>`:’’}

  </div>`;
}

function buildQZResult(){
const score=state.qzScore, total=state.qzQuestions.length||score;
const pct=total>0?Math.round(score/total*100):100;
return`<div class="result-screen">
<div class="result-score">${score}/${total}</div>
<div class="result-label">${pct>=80?‘Excellent work!’:pct>=50?‘Good effort.’:‘Keep studying.’}</div>
<div class="btn-row">
<button class="btn btn-primary" onclick="startQuiz()">Try again</button>
<button class="btn btn-secondary" onclick="setState({qzStarted:false,qzDone:false,qzScore:0,qzIdx:0,qzQuestions:[],qzVerb:null,qzSelectedConjs:[],selectedGroups:[]})">New settings</button>
</div>

  </div>`;
}

// ============================================================
// CONJUGATION SELECTOR
// ============================================================
function buildConjSelector(sel, toggleFn, selectAllFn){
function rowHTML(rows, group){
return rows.map(row=>{
if(row.single){
const key=`${group}|${row.id}|pos`, s=sel.includes(key);
return`<tr><td class="row-label">${row.label}</td><td colspan="2"><button class="sel-btn ${s?'active':''}" onclick="${toggleFn}('${group}','${row.id}','pos')">${s?'✓ Selected':'Select'}</button></td></tr>`;
}
const kP=`${group}|${row.id}|pos`, kN=`${group}|${row.id}|neg`, sP=sel.includes(kP), sN=sel.includes(kN);
return`<tr><td class="row-label">${row.label}</td> <td><button class="sel-btn ${sP?'active':''}" onclick="${toggleFn}('${group}','${row.id}','pos')">${sP?'✓':'+'}</button></td> <td><button class="sel-btn ${sN?'active':''}" onclick="${toggleFn}('${group}','${row.id}','neg')">${sN?'✓':'+'}</button></td></tr>`;
}).join(’’);
}
return`<div style="overflow-x:auto;margin-bottom:12px;">
<div class="conj-section"><div class="conj-section-title">Plain forms</div>
<table class="conj-table"><thead><tr><th>Form</th><th>Pos</th><th>Neg</th></tr></thead>
<tbody>${rowHTML(PLAIN_ROWS,‘plain’)}</tbody></table></div>
<div class="conj-section"><div class="conj-section-title">Polite forms</div>
<table class="conj-table"><thead><tr><th>Form</th><th>Pos</th><th>Neg</th></tr></thead>
<tbody>${rowHTML(POLITE_ROWS,‘polite’)}</tbody></table></div>

  </div>
  <button class="btn btn-secondary" style="font-size:12px;padding:7px 14px;margin-bottom:16px;" onclick="${selectAllFn}()">Select all</button>`;
}

// ============================================================
// EVENT HANDLERS
// ============================================================
window.goHome = () => setState({screen:‘home’, fcCards:[], fcConjCards:[], fcIdx:0, fcFlipped:false, qzStarted:false, qzDone:false, selectedGroups:[]});
window.goTo = (s) => setState({screen:s, fcCards:[], fcConjCards:[], fcIdx:0, fcFlipped:false, qzStarted:false, qzDone:false});

window.toggleGroup = (name) => {
const sel = state.selectedGroups;
setState({selectedGroups: sel.includes(name) ? sel.filter(g=>g!==name) : […sel, name]});
};
window.selectAllGroups = () => {
const groups = getGroupsForPOS(state.level, state.pos);
setState({selectedGroups: groups.map(g=>g.name)});
};

// Flashcard
window.startVocabFC = () => {
const words = shuffle(getWordsForGroups(state.level, state.pos, state.selectedGroups));
setState({fcCards:words, fcIdx:0, fcFlipped:false});
};
window.fcNext = () => {
const cards = state.fcMode===‘conj’ ? state.fcConjCards : state.fcCards;
setState({fcIdx:Math.min(state.fcIdx+1, cards.length-1), fcFlipped:false});
};
window.fcPrev = () => setState({fcIdx:Math.max(state.fcIdx-1,0), fcFlipped:false});

window.searchFCVerb = () => {
const el = document.getElementById(‘fcVerbInput’);
if(el) setState({fcVerbSearch:el.value});
};
window.selectFCVerb = (i) => setState({fcVerb:VERB_LIST[i], fcSelectedConjs:[], fcVerbSearch:’’});
window.toggleFCConj = (g,row,col) => {
const key=`${g}|${row}|${col}`, sel=state.fcSelectedConjs;
setState({fcSelectedConjs:sel.includes(key)?sel.filter(k=>k!==key):[…sel,key]});
};
window.selectAllFCConjs = () => {
const conjs=conjugate(state.fcVerb.k,state.fcVerb.r);
setState({fcSelectedConjs:Object.entries(conjs).filter(([,v])=>v!==null).map(([k])=>k)});
};
window.startConjFC = () => {
const conjs=conjugate(state.fcVerb.k,state.fcVerb.r);
const cards=shuffle(state.fcSelectedConjs.map(key=>{
const [g,row,col]=key.split(’|’);
return{verb:state.fcVerb,group:g,row,col,val:conjs[key],label:getConjLabel(g,row,col)};
}).filter(c=>c.val));
setState({fcConjCards:cards, fcIdx:0, fcFlipped:false});
};

// Quiz
window.searchQZVerb = () => {
const el = document.getElementById(‘qzVerbInput’);
if(el) setState({qzVerbSearch:el.value});
};
window.selectQZVerb = (i) => setState({qzVerb:VERB_LIST[i], qzSelectedConjs:[], qzVerbSearch:’’});
window.toggleQZConj = (g,row,col) => {
const key=`${g}|${row}|${col}`, sel=state.qzSelectedConjs;
setState({qzSelectedConjs:sel.includes(key)?sel.filter(k=>k!==key):[…sel,key]});
};
window.selectAllQZConjs = () => {
const conjs=conjugate(state.qzVerb.k,state.qzVerb.r);
setState({qzSelectedConjs:Object.entries(conjs).filter(([,v])=>v!==null).map(([k])=>k)});
};

window.startQuiz = () => {
if(state.qzMode===‘vocab’) {
const words = shuffle(getWordsForGroups(state.level, state.pos, state.selectedGroups));
if(state.qzType===‘mc’) {
const front=state.qzFront;
const qs = words.slice(0,10).map(w=>{
if(front===‘kanji’) return{q:w.k||w.r, ans:w.r, options:makeDistractors(w.r,words,‘r’), hint:‘What is the reading?’};
if(front===‘kana’) return{q:w.r, ans:w.e, options:makeDistractors(w.e,words,‘e’), hint:‘What does this mean?’};
return{q:w.e, ans:w.k||w.r, options:makeDistractors(w.k||w.r,words,‘k’), hint:‘What is the kanji?’};
});
setState({qzQuestions:qs, qzIdx:0, qzScore:0, qzDone:false, qzAnswered:false, qzSelected:null, qzStarted:true});
} else {
setupVocabMatch(words);
}
} else {
const conjs=conjugate(state.qzVerb.k,state.qzVerb.r);
const cards=shuffle(state.qzSelectedConjs.map(key=>{
const [g,row,col]=key.split(’|’);
return{verb:state.qzVerb,group:g,row,col,val:conjs[key],label:getConjLabel(g,row,col)};
}).filter(c=>c.val));
if(state.qzType===‘mc’) {
const qs=cards.slice(0,10).map(c=>({q:c.verb.k, qSub:c.label, ans:c.val.r, options:makeConjDistractors(c.val.r,c.verb), hint:`What is the ${c.label} form?`}));
setState({qzQuestions:qs, qzIdx:0, qzScore:0, qzDone:false, qzAnswered:false, qzSelected:null, qzStarted:true});
} else {
setupConjMatch(cards);
}
}
};

function setupVocabMatch(words) {
const front=state.qzFront;
const pairs=shuffle(words).slice(0,6).map(w=>{
if(front===‘kanji’) return{q:w.k||w.r, ans:w.r};
if(front===‘kana’) return{q:w.r, ans:w.e};
return{q:w.e, ans:w.k||w.r};
});
const right=shuffle(pairs.map((p,i)=>({ans:p.ans,origIdx:i})));
setState({qzMatchLeft:pairs, qzMatchRight:right, qzMatchMatched:[], qzMatchSelL:null, qzMatchSelR:null, qzScore:0, qzDone:false, qzQuestions:pairs, _matchWords:words, _matchType:‘vocab’, qzStarted:true});
}
function setupConjMatch(cards) {
const pairs=shuffle(cards).slice(0,6).map(c=>({q:c.label, ans:c.val.r}));
const right=shuffle(pairs.map((p,i)=>({ans:p.ans,origIdx:i})));
setState({qzMatchLeft:pairs, qzMatchRight:right, qzMatchMatched:[], qzMatchSelL:null, qzMatchSelR:null, qzScore:0, qzDone:false, qzQuestions:pairs, _matchCards:cards, _matchType:‘conj’, qzStarted:true});
}

window.selMatchL = (i) => { setState({qzMatchSelL:i}); checkMatch(); };
window.selMatchR = (i) => { setState({qzMatchSelR:i}); checkMatch(); };
function checkMatch(){
const {qzMatchSelL:l, qzMatchSelR:r, qzMatchRight:right, qzMatchMatched:matched} = state;
if(l===null||r===null) return;
if(right[r].origIdx===l) {
setState({qzMatchMatched:[…matched,l], qzMatchSelL:null, qzMatchSelR:null, qzScore:state.qzScore+1});
} else {
const ml=document.getElementById(‘ml-’+l), mr=document.getElementById(‘mr-’+r);
if(ml){ml.classList.add(‘wrong-flash’);setTimeout(()=>ml&&ml.classList.remove(‘wrong-flash’),500);}
if(mr){mr.classList.add(‘wrong-flash’);setTimeout(()=>mr&&mr.classList.remove(‘wrong-flash’),500);}
setState({qzMatchSelL:null, qzMatchSelR:null});
}
}
window.nextMatchRound = () => {
if(state._matchType===‘vocab’) setupVocabMatch(state._matchWords);
else setupConjMatch(state._matchCards);
};
window.answerMC = (opt,ans) => setState({qzAnswered:true, qzSelected:opt, qzScore:opt===ans?state.qzScore+1:state.qzScore});
window.nextQ = () => {
const next=state.qzIdx+1;
if(next>=state.qzQuestions.length) setState({qzDone:true, qzAnswered:false});
else setState({qzIdx:next, qzAnswered:false, qzSelected:null});
};

render();
</script>

</body>
</html>
